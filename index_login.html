  <script>
    // 页面加载时检查是否已登录
    window.addEventListener('DOMContentLoaded', function() {
      // 检查sessionStorage中是否有登录状态
      if (sessionStorage.getItem('isLoggedIn') === 'true') {
        // 如果已登录，直接根据type参数跳转
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        
        if (typeParam == 1) {
          window.location.href = 'connect.html';
        } else if (typeParam == 2) {
          window.location.href = 'sweet.html';
        } else if (typeParam == 3) {
          window.location.href = 'yifang.html';
        } else if (typeParam == 4) {
          window.location.href = 'morpheus.html';
        } else if (typeParam == 5) {
          window.location.href = 'echoflow.html';
        } else {
          window.location.href = 'index.html';
        }
      }
      
      // 为密码输入框添加回车键事件监听
      const passwordInput = document.getElementById('password');
      passwordInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          validatePassword();
        }
      });
    });

    // 密码验证功能
    function validatePassword() {
      // 设置正确的密码为8888
      const correctPassword = '8888';
      const enteredPassword = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');

      if (enteredPassword === correctPassword) {
        // 密码正确，设置登录状态到sessionStorage
        sessionStorage.setItem('isLoggedIn', 'true');
        
        // 根据URL参数type决定跳转目标
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');

        if (typeParam == 1) {
          // 当type==1时跳转到connect.html
          window.location.href = 'connect.html';
        }else if (typeParam == 2) {
          // 当type==2时跳转到sweet.html
          window.location.href = 'sweet.html';
        }else if (typeParam == 3) {
          // 当type==3时跳转到yifang.html
          window.location.href = 'yifang.html';
        }else if (typeParam == 4) {
          // 当type==4时跳转到morpheus.html
          window.location.href = 'morpheus.html';
        }else if (typeParam == 5) {
          // 当type==4时跳转到morpheus.html
          window.location.href = 'echoflow.html';
        } else {
          // 其他情况跳转到首页
          window.location.href = 'index.html';
        }
      } else {
        // 密码错误，显示错误消息
        errorMessage.classList.remove('hidden');
        // 3秒后隐藏错误消息
        setTimeout(() => {
          errorMessage.classList.add('hidden');
        }, 3000);
      }
    }
  </script>
